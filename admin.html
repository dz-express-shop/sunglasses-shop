<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS LUXURY | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style> body { font-family: 'Cairo', sans-serif; background: #f3f4f6; } </style>
</head>
<body x-data="adminPanel()" class="p-4 md:p-10">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-black mb-8 text-stone-800 border-b pb-4">إضافة موديل جديد 🕶️</h1>

        <form @submit.prevent="submitProduct" class="space-y-6">
            
            <!-- معلومات أساسية -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-stone-600 mb-1">اسم الموديل</label>
                    <input type="text" x-model="product.name" class="w-full border p-3 rounded-lg" placeholder="مثال: Prada V1" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-stone-600 mb-1">الماركة</label>
                    <input type="text" x-model="product.brand" class="w-full border p-3 rounded-lg" placeholder="مثال: Prada" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-stone-600 mb-1">السعر (دج)</label>
                    <input type="number" x-model="product.price" class="w-full border p-3 rounded-lg" placeholder="4500" required>
                </div>
                <div>
                    <label class="block text-sm font-bold text-stone-600 mb-1">القسم</label>
                    <select x-model="product.gender" class="w-full border p-3 rounded-lg">
                        <option value="homme">رجال</option>
                        <option value="femme">نساء</option>
                    </select>
                </div>
            </div>

            <!-- رفع الصور (السحر هنا) -->
            <div class="p-6 bg-stone-50 border-2 border-dashed border-stone-300 rounded-xl text-center">
                <label class="block text-sm font-bold text-stone-600 mb-4">رفع الصور (تترفع أوتوماتيكياً)</label>
                <input type="file" multiple accept="image/*" @change="uploadImages" class="block w-full text-sm text-stone-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100 cursor-pointer">
                
                <div x-show="uploading" class="mt-4 text-amber-600 font-bold animate-pulse">جاري رفع الصور... ⏳</div>
                
                <!-- عرض الصور المرفوعة -->
                <div class="flex gap-2 mt-4 flex-wrap justify-center">
                    <template x-for="img in product.images" :key="img">
                        <img :src="img" class="w-20 h-20 object-cover rounded-lg shadow-sm border border-stone-200">
                    </template>
                </div>
            </div>

            <!-- الألوان (Variants) -->
            <div>
                <label class="block text-sm font-bold text-stone-600 mb-2">الألوان (Variants)</label>
                <div class="flex gap-2 mb-2">
                    <input type="text" x-model="newColor.name" placeholder="اسم اللون (أسود)" class="border p-2 rounded-lg flex-1">
                    <input type="color" x-model="newColor.hex" class="h-10 w-10 border rounded-lg cursor-pointer">
                    <button type="button" @click="addColor" class="bg-stone-800 text-white px-4 py-2 rounded-lg font-bold">أضف</button>
                </div>
                
                <!-- عرض الألوان المضافة -->
                <div class="flex gap-2 flex-wrap mt-3">
                    <template x-for="(c, i) in product.colors" :key="i">
                        <div class="flex items-center gap-2 bg-white border px-3 py-1 rounded-full shadow-sm">
                            <div class="w-3 h-3 rounded-full" :style="`background-color: ${c.hex}`"></div>
                            <span class="text-xs font-bold" x-text="c.name"></span>
                            <button type="button" @click="product.colors.splice(i, 1)" class="text-red-500 font-bold ml-2">X</button>
                        </div>
                    </template>
                </div>
            </div>

            <button type="submit" :disabled="uploading || submitting" class="w-full bg-amber-600 text-white font-black text-xl py-4 rounded-xl shadow-lg hover:bg-amber-500 transition-all disabled:opacity-50">
                <span x-text="submitting ? 'جاري الإضافة للـ Sheet... ⏳' : 'إضافة الموديل للسوق 🚀'"></span>
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('adminPanel', () => ({
                // 🔑 جيب API Key مجاني من api.imgbb.com وحطو هنا
                IMGBB_API_KEY: 'b0fa763c761b0c0f992a7924d5b7dc44', // حط الـ Key تاعك هنا (هذا مثال برك)
                
                product: { name: '', brand: '', price: '', gender: 'homme', images: [], colors: [] },
                newColor: { name: '', hex: '#000000' },
                uploading: false,
                submitting: false,

                addColor() {
                    if(this.newColor.name) {
                        this.product.colors.push({...this.newColor});
                        this.newColor = { name: '', hex: '#000000' };
                    }
                },

                async uploadImages(event) {
                    const files = event.target.files;
                    if(files.length === 0) return;
                    
                    this.uploading = true;
                    
                    for (let file of files) {
                        const formData = new FormData();
                        formData.append('image', file);
                        
                        try {
                            const res = await fetch(`https://api.imgbb.com/1/upload?key=${this.IMGBB_API_KEY}`, {
                                method: 'POST',
                                body: formData
                            });
                            const data = await res.json();
                            if(data.success) {
                                this.product.images.push(data.data.url); // الرابط المباشر يجي وحدو!
                            }
                        } catch (error) {
                            alert("حدث خطأ في رفع الصورة.");
                        }
                    }
                    this.uploading = false;
                },

                async submitProduct() {
                    if(this.product.images.length === 0) return alert("لازم ترفع صورة واحدة على الأقل!");
                    this.submitting = true;

                    // تجهيز الداتا باش يفهمها Google Sheet تاعك
                    const finalData = {
                        action: "addProduct",
                        name: this.product.name,
                        brand: this.product.brand,
                        price: this.product.price,
                        gender: this.product.gender,
                        images: this.product.images.join(','), // نقلبوهم نص بيناتهم فاصلة
                        colorNames: this.product.colors.map(c => c.name).join(','),
                        hexCodes: this.product.colors.map(c => c.hex).join(',')
                    };

                    const API_URL = "https://script.google.com/macros/s/AKfycbwv6ohDtq3W8JLc4lK6vTY4UlEBWzZ2l8p_2XvGVM87y3GE7Kl7kGrm50rZZ4VdcxYb/exec";

                    try {
                        await fetch(API_URL, {
                            method: "POST",
                            mode: "no-cors",
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify(finalData)
                        });
                        alert("تم إضافة الموديل بنجاح! مبروك عليك.");
                        this.product = { name: '', brand: '', price: '', gender: 'homme', images: [], colors: [] };
                    } catch(e) {
                        alert("خطأ في الاتصال.");
                    }
                    this.submitting = false;
                }
            }))
        })
    </script>
</body>
</html>
