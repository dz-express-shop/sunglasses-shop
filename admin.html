<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS LUXURY | CRM Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .status-badge { padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: bold; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-confirmed { background: #d1fae5; color: #059669; }
        .status-noanswer { background: #fee2e2; color: #dc2626; }
    </style>
</head>
<body x-data="crmLogic()" class="text-stone-800">

    <!-- شريط الإدارة العلوي -->
    <header class="bg-black text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="font-black tracking-[0.2em] text-xl uppercase text-amber-500">ANIS CRM</h1>
            <span class="bg-stone-800 text-xs px-3 py-1 rounded-full">لوحة تأكيد الطلبات</span>
        </div>
        <div class="flex gap-4 text-sm font-bold">
            <p>إجمالي الطلبات اليوم: <span class="text-amber-500" x-text="orders.length">0</span></p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 flex gap-6 mt-4">
        
        <!-- القائمة الجانبية (Sidebar) -->
        <aside class="w-1/4 bg-white p-6 shadow-sm rounded-lg h-fit sticky top-24">
            <h3 class="font-bold text-lg mb-6 border-b pb-2">فلترة الطلبات</h3>
            <ul class="space-y-3 text-sm font-bold text-stone-500">
                <li class="cursor-pointer hover:text-amber-600 transition-colors flex justify-between" @click="filterStatus = 'all'">
                    <span>الكل (Tous)</span>
                    <span class="bg-stone-100 px-2 rounded" x-text="orders.length"></span>
                </li>
                <li class="cursor-pointer hover:text-amber-600 transition-colors flex justify-between" @click="filterStatus = 'جديد'">
                    <span class="text-amber-600">طلبات جديدة (À confirmer)</span>
                    <span class="bg-amber-50 px-2 rounded" x-text="orders.filter(o => o.status === 'جديد').length"></span>
                </li>
                <li class="cursor-pointer hover:text-green-600 transition-colors flex justify-between" @click="filterStatus = 'مؤكد'">
                    <span>تم التأكيد (Confirmé)</span>
                </li>
            </ul>
        </aside>

        <!-- مساحة العمل: قائمة الطلبات -->
        <section class="w-3/4 space-y-4">
            
            <template x-for="order in filteredOrders" :key="order.id">
                <div class="bg-white p-5 shadow-sm rounded-lg border border-stone-200 hover:border-amber-400 transition-all">
                    
                    <div class="flex justify-between items-start mb-4 border-b pb-4">
                        <div>
                            <h2 class="text-xl font-black text-stone-900" x-text="order.name"></h2>
                            <p class="text-sm font-bold text-stone-500 mt-1">
                                <span x-text="order.wilaya"></span> | <span x-text="order.commune"></span>
                            </p>
                        </div>
                        <div class="text-left">
                            <span :class="{
                                'status-badge status-pending': order.status === 'جديد',
                                'status-badge status-confirmed': order.status === 'مؤكد',
                                'status-badge status-noanswer': order.status === 'لا يرد'
                            }" x-text="order.status"></span>
                            <p class="text-lg font-black text-amber-600 mt-2" x-text="order.total + ' دج'"></p>
                        </div>
                    </div>

                    <div class="flex justify-between items-center">
                        <!-- تفاصيل المنتج -->
                        <div class="text-sm font-bold bg-stone-50 px-4 py-2 rounded-md border border-stone-100">
                            <span class="text-stone-400 mr-2">الموديل:</span> <span x-text="order.model"></span> | 
                            <span class="text-stone-400 mx-2">اللون:</span> <span x-text="order.color"></span> | 
                            <span class="text-stone-400 mx-2">العرض:</span> <span x-text="order.offer"></span>
                        </div>

                        <!-- أزرار الأكشن السريعة (The Magic) -->
                        <div class="flex gap-2">
                            <!-- زر الواتساب -->
                            <a :href="'https://wa.me/213' + order.phone.substring(1) + '?text=' + encodeURIComponent('مرحباً ' + order.name + '، معك فريق تأكيد الطلبات لـ ANIS LUXURY. بخصوص طلبك لنظارات ' + order.model + '...')" 
                               target="_blank" 
                               class="bg-green-100 hover:bg-green-200 text-green-700 p-2 rounded-md transition-colors flex items-center gap-2 text-xs font-bold">
                               <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12.031 0C5.385 0 0 5.385 0 12.031c0 2.645.69 5.225 2.001 7.494L.645 24l4.636-1.311a12.022 12.022 0 0 0 6.75 2.041c6.646 0 12.03-5.385 12.03-12.03C24.06 5.385 18.676 0 12.031 0z"/></svg>
                               واتساب
                            </a>
                            <!-- زر الاتصال -->
                            <a :href="'tel:' + order.phone" 
                               class="bg-stone-100 hover:bg-stone-200 text-stone-700 p-2 rounded-md transition-colors flex items-center gap-2 text-xs font-bold">
                               📞 اتصال
                            </a>
                            
                            <!-- تغيير الحالة -->
                            <select x-model="order.status" @change="updateStatus(order.id, order.status)" class="bg-black text-white text-xs font-bold p-2 rounded-md cursor-pointer outline-none">
                                <option value="جديد">حالة الطلب: جديد</option>
                                <option value="مؤكد">✅ تم التأكيد</option>
                                <option value="لا يرد">⚠️ لا يرد (المحاولة 1)</option>
                                <option value="ملغى">❌ ملغى</option>
                            </select>
                        </div>
                    </div>

                </div>
            </template>

        </section>
    </main>

    <script>
        function crmLogic() {
            return {
                filterStatus: 'all',
                // بيانات وهمية للتجربة (في الخطوة القادمة سنربطها بـ Google Sheets)
                orders: [
                    { id: 'ORD-001', name: 'محمد أمين', phone: '0791059501', wilaya: '16-الجزائر', commune: 'الرويبة', model: 'Cartier Classic', color: 'أسود ملكي', offer: '2x', total: 16000, status: 'جديد' },
                    { id: 'ORD-002', name: 'ياسين ب', phone: '0776764125', wilaya: '05-باتنة', commune: 'بريكة', model: 'Ray-Ban Aviator', color: 'ذهبي', offer: '1x', total: 5300, status: 'جديد' }
                ],
                
                get filteredOrders() {
                    if (this.filterStatus === 'all') return this.orders;
                    return this.orders.filter(o => o.status === this.filterStatus);
                },

                updateStatus(id, newStatus) {
                    // هنا سيتم إرسال أمر التحديث إلى Google Sheets مستقبلاً
                    console.log(`تم تحديث الطلب ${id} إلى: ${newStatus}`);
                    // تنبيه بصري خفيف للكونفيرماتريس
                    // alert('تم حفظ التغيير بنجاح!');
                }
            }
        }
    </script>
</body>
</html>
