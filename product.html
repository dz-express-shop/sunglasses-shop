<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS LUXURY | صفحة الطلب المؤكد</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Marcellus&display=swap" rel="stylesheet">
    
    <style>
        body { background: #050505; color: #fff; font-family: 'Cairo', sans-serif; }
        .lux-card { background: #0a0a0a; border: 1px solid #1a1a1a; transition: 0.3s; }
        .lux-input { background: #0f0f0f; border: 1px solid #222; width: 100%; padding: 16px; color: #fff; border-radius: 4px; transition: 0.3s; }
        .lux-input:focus { border-color: #d97706; outline: none; }
        
        /* Advanced Color Swatches */
        .swatch { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; transition: 0.3s; border: 3px solid transparent; }
        .swatch.active { border-color: #d97706; box-shadow: 0 0 20px rgba(217, 119, 6, 0.4); transform: scale(1.1); }
        
        /* Custom Select */
        select { background-color: #0f0f0f !important; }
        
        /* Oath Checkbox Style */
        .oath-box { border: 1px solid #333; transition: 0.3s; }
        .oath-box:has(input:checked) { border-color: #d97706; background: #1a1205; }
    </style>
</head>
<body class="pb-20">

    <main class="max-w-6xl mx-auto p-6 grid md:grid-cols-2 gap-12 mt-10">
        
        <!-- القسم الأيسر: العرض البصري -->
        <section class="space-y-6">
            <div class="aspect-square bg-[#0a0a0a] border border-white/5 shadow-2xl rounded-sm">
                <img id="product-img" src="images/product-main.jpg" class="w-full h-full object-cover">
            </div>
        </section>

        <!-- القسم الأيمن: الفورم والخيارات -->
        <section class="space-y-8">
            <div>
                <h1 id="product-name" class="text-4xl font-black uppercase tracking-tight text-white">Cartier Pasha Edition</h1>
                <p id="product-price" class="text-2xl text-amber-500 font-bold mt-2">9,500 DA</p>
            </div>

            <!-- اختيار الألوان المتقدم -->
            <div class="space-y-3">
                <label class="text-xs text-stone-400 uppercase tracking-widest">اختر اللون (Couleur):</label>
                <div id="color-options" class="flex gap-4">
                    <!-- Swatches Generated by JS -->
                </div>
            </div>

            <!-- الفورم (Advanced & Clean) -->
            <form id="order-form" class="space-y-4">
                <input type="text" id="name" placeholder="الاسم واللقب" class="lux-input" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="phone1" placeholder="رقم الهاتف الأساسي" class="lux-input" required>
                    <input type="tel" id="phone2" placeholder="رقم هاتف إضافي" class="lux-input">
                </div>
                
                <select id="wilaya" class="lux-input" required>
                    <option value="">اختر الولاية (58 ولاية)</option>
                </select>
                
                <input type="text" id="commune" placeholder="البلدية" class="lux-input" required>

                <!-- ميثاق الأمانة (Trust Oath) -->
                <label class="oath-box flex items-start gap-4 p-5 cursor-pointer">
                    <input type="checkbox" id="oath" required class="mt-1 w-5 h-5 accent-amber-600">
                    <div class="text-xs leading-relaxed">
                        <span class="font-bold text-amber-500">أقسم بالله العلي العظيم أنني جاد في طلبي وسأستلم السلعة.</span>
                        <p class="text-stone-400 mt-2 italic font-luxury text-[10px]">۞ إِنَّ اللَّهَ يَأْمُرُكُمْ أَن تُؤَدُّوا الْأَمَانَاتِ إِلَىٰ أَهْلِهَا ۞</p>
                    </div>
                </label>

                <button type="submit" class="w-full bg-amber-600 py-5 font-black uppercase tracking-widest hover:bg-amber-500 transition-all shadow-[0_0_20px_rgba(217,119,6,0.3)]">
                    تأكيد الطلب
                </button>
            </form>
        </section>
    </main>

    <script>
        // 1. نظام الولايات (58 ولاية كاملة)
        const wilayas = [
            "01-أدرار", "02-الشلف", "03-الأغواط", "04-أم البواقي", "05-باتنة", "06-بجاية", "07-بسكرة", "08-بشار", "09-البليدة", "10-البويرة", 
            "11-تمنراست", "12-تبسة", "13-تلمسان", "14-تيارت", "15-تيزي وزو", "16-الجزائر", "17-الجلفة", "18-جيجل", "19-سطيف", "20-سعيدة", 
            "21-سكيكدة", "22-سيدي بلعباس", "23-عنابة", "24-قالمة", "25-قسنطينة", "26-المدية", "27-مستغانم", "28-المسيلة", "29-معسكر", "30-ورقلة", 
            "31-وهران", "32-البيض", "33-إليزي", "34-برج بوعريريج", "35-بومرداس", "36-الطارف", "37-تندوف", "38-تسمسيلت", "39-الوادي", "40-خنشلة", 
            "41-سوق أهراس", "42-تيبازة", "43-ميلة", "44-عين الدفلى", "45-النعامة", "46-عين تموشنت", "47-غرداية", "48-غليزان", "49-تيميمون", "50-برج باجي مختار", 
            "51-أولاد جلال", "52-بني عباس", "53-إن صالح", "54-إن قزام", "55-تقرت", "56-جانت", "57-المغير", "58-المنيعة"
        ];
        
        const wilayaSelect = document.getElementById('wilaya');
        wilayas.forEach(w => wilayaSelect.innerHTML += `<option value="${w}">${w}</option>`);

        // 2. نظام الألوان (Color Options Logic)
        const colors = [
            { name: 'أسود فخم', hex: '#000000', img: 'images/black.jpg' },
            { name: 'ذهبي كلاسيك', hex: '#d4af37', img: 'images/gold.jpg' },
            { name: 'بني ملكي', hex: '#4a3728', img: 'images/brown.jpg' }
        ];

        const colorContainer = document.getElementById('color-options');
        colors.forEach((c, i) => {
            const div = document.createElement('div');
            div.className = `swatch ${i === 0 ? 'active' : ''}`;
            div.style.backgroundColor = c.hex;
            div.onclick = function() {
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('product-img').src = c.img;
            };
            colorContainer.appendChild(div);
        });
    </script>
</body>
</html>
