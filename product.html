<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS LUXURY | تجربة الشراء الفاخرة</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Marcellus&display=swap" rel="stylesheet">
    
    <style>
        body { background: #050505; color: #fff; font-family: 'Cairo', sans-serif; }
        .input-group { position: relative; }
        .lux-input { background: #0a0a0a; border: 1px solid #222; width: 100%; padding: 14px; transition: 0.3s; }
        .lux-input:focus { border-color: #d97706; outline: none; }
        
        /* تحسين دوائر الألوان */
        .swatch-container { display: flex; gap: 15px; margin-top: 10px; }
        .swatch { width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.3s; border: 2px solid transparent; position: relative; }
        .swatch.active { border-color: #d97706; transform: scale(1.1); box-shadow: 0 0 15px rgba(217, 119, 6, 0.3); }
        
        /* تحسين قائمة الولايات */
        select.lux-input { appearance: none; background-image: url("data:image/svg+xml,..."); background-repeat: no-repeat; background-position: left 1rem center; }
    </style>
</head>
<body class="pb-20">

    <!-- Header -->
    <header class="p-6 flex justify-between items-center border-b border-white/5">
        <a href="catalog.html" class="text-stone-400 text-xs uppercase tracking-widest font-bold">← العودة</a>
        <h1 class="font-luxury text-xl tracking-[0.3em] uppercase">ANIS</h1>
        <div class="w-10"></div>
    </header>

    <main class="max-w-5xl mx-auto p-6 grid md:grid-cols-2 gap-12 mt-8">
        
        <!-- القسم الأيسر: الصور -->
        <section>
            <div class="aspect-square bg-[#0a0a0a] rounded-sm overflow-hidden border border-white/5 shadow-2xl">
                <img id="product-img" src="" class="w-full h-full object-cover">
            </div>
        </section>

        <!-- القسم الأيمن: الخيارات والطلب -->
        <section class="space-y-8">
            <div>
                <h2 id="product-name" class="text-3xl font-black uppercase tracking-tight"></h2>
                <p id="product-price" class="text-amber-500 text-xl font-bold mt-2"></p>
            </div>

            <!-- اختيار اللون (Very Advanced Swatches) -->
            <div>
                <label class="text-xs text-stone-500 uppercase tracking-widest">اختر لون الإطار:</label>
                <div id="color-options" class="swatch-container"></div>
                <p id="selected-color-name" class="text-xs text-stone-400 mt-2 font-bold"></p>
            </div>

            <!-- العروض (Upsell) -->
            <div class="grid gap-3">
                <div class="offer-box p-4 border border-amber-500/30 bg-amber-500/5 cursor-pointer" onclick="selectOffer(1, this)">
                    <p class="font-bold">نظارة واحدة</p>
                </div>
                <div class="offer-box p-4 border border-stone-800 cursor-pointer" onclick="selectOffer(2, this)">
                    <p class="font-bold">نظارتين (تخفيض 1500دج + توصيل مجاني)</p>
                </div>
            </div>

            <!-- الفورم (Clean & Professional) -->
            <form id="order-form" class="space-y-4">
                <input type="text" id="name" placeholder="الاسم الكامل" class="lux-input" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" id="phone1" placeholder="رقم الهاتف" class="lux-input" required>
                    <select id="wilaya" class="lux-input" required>
                        <option value="">الولاية (58 ولاية)</option>
                    </select>
                </div>
                <input type="text" id="commune" placeholder="البلدية" class="lux-input" required>
                
                <button type="submit" class="w-full bg-amber-600 py-4 font-black tracking-widest uppercase hover:bg-amber-500 transition-all">
                    تأكيد الطلب
                </button>
            </form>
        </section>
    </main>

    <script>
        // هنا المنطق البرمجي (Javascript)
        // 1. تهيئة الولايات
        const wilayaSelect = document.getElementById('wilaya');
        const wilayas = ["01-أدرار", "05-باتنة", "16-الجزائر", "31-وهران", "19-سطيف"]; // كمل الباقي بنفس الطريقة
        wilayas.forEach(w => wilayaSelect.innerHTML += `<option value="${w}">${w}</option>`);

        // 2. دوال التفاعل (Color Swatch Selection)
        window.selectColor = function(element, colorName, imgSrc) {
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('product-img').src = imgSrc;
            document.getElementById('selected-color-name').innerText = colorName;
        }
    </script>
</body>
</html>
