<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS LUXURY | تجربة الشراء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #F8F8F8; color: #111; font-family: 'Cairo', sans-serif; }
        .snap-scroll { scroll-snap-type: x mandatory; }
        .snap-item { scroll-snap-align: center; }
        .input-pro { background: #ffffff; border: 1px solid #e5e5e5; padding: 15px; width: 100%; transition: 0.3s; }
        .input-pro:focus { border-color: #d97706; outline: none; }
        .oath-box:has(input:checked) { border-color: #d97706; background: #fffbeb; }
    </style>
</head>
<body x-data="shopLogic()">

    <!-- Header -->
    <nav class="sticky top-0 bg-[#F8F8F8]/90 backdrop-blur-md z-50 p-6 flex justify-between border-b border-stone-200">
        <a href="catalog.html" class="font-bold text-xs">← العودة</a>
        <h1 class="font-bold tracking-[0.2em]">ANIS LUXURY</h1>
        <div class="w-10"></div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid md:grid-cols-2 gap-12">
        
        <!-- الصور (Horizontal Snap Scroll) -->
        <section class="flex flex-col gap-4">
            <div class="snap-scroll flex overflow-x-auto gap-4 pb-4 w-full">
                <img src="images/prod1.jpg" class="snap-item w-full md:w-[500px] aspect-square object-cover shadow-xl">
                <img src="images/prod2.jpg" class="snap-item w-full md:w-[500px] aspect-square object-cover shadow-xl">
            </div>
            <p class="text-[10px] text-stone-400 uppercase tracking-widest text-center">سحب لليسار لرؤية التفاصيل</p>
        </section>

        <!-- الخيارات والطلب -->
        <section class="space-y-8">
            <div>
                <h1 class="text-4xl font-black uppercase">Cartier Signature</h1>
                <p class="text-2xl font-bold mt-2 text-amber-600" x-text="formatPrice(totalPrice)"></p>
            </div>

            <!-- الألوان (Text Selection) -->
            <div>
                <label class="text-xs font-bold uppercase mb-3 block">اللون المتاح:</label>
                <div class="flex gap-3">
                    <template x-for="c in colors">
                        <button @click="selectedColor = c" 
                                :class="selectedColor === c ? 'bg-black text-white' : 'bg-white border border-black'"
                                class="px-6 py-2 text-sm font-bold transition-all" x-text="c"></button>
                    </template>
                </div>
            </div>

            <!-- العروض الذكية -->
            <div class="space-y-3">
                <div @click="setOffer(1)" :class="offer === 1 ? 'border-amber-600 bg-amber-50' : 'border-stone-300'" class="p-4 border cursor-pointer">
                    <p class="font-bold">نظارة واحدة - <span class="text-stone-500 font-normal">9,500 دج</span></p>
                </div>
                <div @click="setOffer(2)" :class="offer === 2 ? 'border-amber-600 bg-amber-50' : 'border-stone-300'" class="p-4 border cursor-pointer">
                    <p class="font-bold">عرض 2 نظارات - <span class="text-stone-500 font-normal">16,000 دج (توصيل مجاني + علبة مجاناً)</span></p>
                </div>
            </div>

            <!-- سويتش العلبة (Cross-sell) -->
            <div class="flex justify-between items-center bg-white p-4 border border-stone-200">
                <span class="font-bold text-sm">أضف علبة فاخرة (+800 دج)</span>
                <input type="checkbox" x-model="box" :disabled="offer === 2" class="w-8 h-4">
            </div>

            <!-- الفورم (Advanced & Clean) -->
            <form @submit.prevent="submitOrder" class="space-y-4">
                <input type="text" x-model="formData.name" placeholder="الاسم الكامل" class="input-pro" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="tel" x-model="formData.phone" placeholder="رقم الهاتف" class="input-pro" required>
                    <select x-model="formData.wilaya" class="input-pro" required>
                        <option value="">الولاية (58)</option>
                        <option>16-الجزائر</option><option>05-باتنة</option>
                    </select>
                </div>
                
                <!-- ميثاق الأمانة -->
                <label class="oath-box flex items-start gap-4 p-4 cursor-pointer border">
                    <input type="checkbox" required class="mt-1">
                    <span class="text-[11px] font-bold">أقسم بالله العلي العظيم أنني جاد في طلبي وسأستلم السلعة.</span>
                </label>

                <button type="submit" class="w-full bg-black text-white py-4 font-bold uppercase tracking-widest hover:bg-amber-600 transition-all">تأكيد الطلب</button>
            </form>
        </section>
    </main>

    <script>
        function shopLogic() {
            return {
                offer: 1,
                box: false,
                basePrice: 9500,
                colors: ['أسود ملكي', 'ذهبي'],
                selectedColor: 'أسود ملكي',
                formData: { name: '', phone: '', wilaya: '' },
                
                get totalPrice() {
                    let price = this.offer === 2 ? 16000 : (this.basePrice * this.offer);
                    if (this.box && this.offer === 1) price += 800;
                    return price;
                },
                
                setOffer(q) {
                    this.offer = q;
                    if(q === 2) this.box = true; // أوتوماتيكي علبة مجانية
                },
                
                formatPrice(p) { return p.toLocaleString() + ' دج'; },
                
                submitOrder() {
                    localStorage.setItem('orderData', JSON.stringify({
                        ...this.formData,
                        price: this.totalPrice,
                        color: this.selectedColor,
                        offer: this.offer
                    }));
                    window.location.href = 'thank-you.html';
                }
            }
        }
    </script>
</body>
</html>
