<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS LUXURY | موديل فخم</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #F9F9F9; color: #1A1A1A; font-family: 'Cairo', sans-serif; }
        /* سكرول ناعم للصور */
        .snap-scroll { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .snap-item { scroll-snap-align: center; }
        /* سويتش العلبة */
        .toggle-checkbox:checked { right: 0; border-color: #d97706; background-color: #d97706; }
        .toggle-checkbox:checked + .toggle-label { background-color: #d97706; }
    </style>
</head>
<body class="pb-20">

    <main class="max-w-6xl mx-auto p-4 md:p-8 grid md:grid-cols-2 gap-10">
        
        <!-- قسم الصور (Scroll Horizontal) -->
        <section class="flex flex-col gap-4">
            <div class="flex overflow-x-auto snap-scroll gap-4 pb-4">
                <img src="images/product-1.jpg" class="snap-item w-full md:w-[500px] aspect-square object-cover shadow-lg">
                <img src="images/product-2.jpg" class="snap-item w-full md:w-[500px] aspect-square object-cover shadow-lg">
                <img src="images/product-3.jpg" class="snap-item w-full md:w-[500px] aspect-square object-cover shadow-lg">
            </div>
            <p class="text-center text-xs text-stone-500 uppercase tracking-widest">اسحب لليمين واليسار لرؤية التفاصيل</p>
        </section>

        <!-- قسم الخيارات -->
        <section class="space-y-8">
            <div>
                <h1 id="product-name" class="text-4xl font-black uppercase">Cartier Signature</h1>
                <p id="product-price" class="text-3xl font-bold mt-2 text-amber-600">9,500 دج</p>
            </div>

            <!-- اختيار الألوان (Text Based) -->
            <div>
                <label class="text-sm font-bold uppercase tracking-widest mb-4 block">اختر اللون:</label>
                <div id="color-options" class="flex gap-3">
                    <button class="px-6 py-2 border border-black hover:bg-black hover:text-white transition-all text-sm font-bold">أسود ملكي</button>
                    <button class="px-6 py-2 border border-black hover:bg-black hover:text-white transition-all text-sm font-bold">ذهبي مصقول</button>
                </div>
            </div>

            <!-- العروض الذكية -->
            <div class="space-y-3">
                <div class="p-4 border border-black cursor-pointer bg-white" onclick="selectOffer(1, this)">
                    <span class="font-bold">نظارة واحدة</span>
                </div>
                <div class="p-4 border border-black cursor-pointer bg-white" onclick="selectOffer(2, this)">
                    <span class="font-bold">عرض 2 نظارات (توصيل مجاني + علبة مجانية)</span>
                </div>
            </div>

            <!-- سويتش العلبة -->
            <div class="flex justify-between items-center bg-white p-4 border border-stone-200">
                <span class="font-bold text-sm">أضف علبة فاخرة (+800 دج)</span>
                <label class="relative inline-block w-12 h-6 cursor-pointer">
                    <input type="checkbox" id="box-switch" class="sr-only toggle-checkbox" onchange="toggleBox()">
                    <span class="block w-12 h-6 bg-stone-300 rounded-full transition toggle-label"></span>
                    <span class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full transition"></span>
                </label>
            </div>

            <button class="w-full bg-black text-white py-5 font-black uppercase text-lg hover:bg-amber-600 transition-all">تأكيد الطلب</button>
        </section>
    </main>

    <script>
        let qty = 1;
        let isBoxSelected = false;

        function selectOffer(q, el) {
            qty = q;
            // logic: اذا خير 2، العلبة تولي مجانية
            if (qty === 2) {
                isBoxSelected = true;
                document.getElementById('box-switch').checked = true;
                document.getElementById('box-switch').disabled = true; // نغلق السويتش
            } else {
                document.getElementById('box-switch').disabled = false;
            }
            // Add visual active class logic here...
        }

        function toggleBox() {
            isBoxSelected = document.getElementById('box-switch').checked;
        }
    </script>
</body>
</html>
