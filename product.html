<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANIS LUXURY | تجربة استثنائية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #0c0a09; color: #e7e5e4; font-family: 'Cairo', sans-serif; }
        .lux-input { background: #1c1917; border: 1px solid #44403c; padding: 16px; width: 100%; color: white; transition: 0.3s; }
        .lux-input:focus { border-color: #d97706; outline: none; background: #292524; }
        .whatsapp-float { z-index: 999; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); } 100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); } }
    </style>
</head>
<body x-data="shopLogic()">

    <a href="https://wa.me/213791059501?text=مرحبا،%20أريد%20الاستفسار%20عن%20منتج" 
       class="whatsapp-float fixed bottom-6 right-6 bg-[#25d366] p-4 rounded-full shadow-2xl">
        <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.003 3.238l-.58 2.16 2.255-.594c.969.533 2.064.814 3.19.814h.001c3.181 0 5.767-2.586 5.768-5.766 0-3.18-2.586-5.766-5.766-5.766zM12.031 21.054c-1.127 0-2.221-.295-3.18-.853l-2.29.601.59-2.203c-1.146-1.527-1.146-3.855 0-5.382 1.547-2.062 4.14-3.237 6.88-3.237 3.99 0 7.234 3.243 7.234 7.234 0 3.99-3.244 7.234-7.234 7.234z"/></svg>
    </a>

    <div class="max-w-md mx-auto p-4 animate-in fade-in duration-700">
        <div class="relative w-full aspect-square rounded-2xl overflow-hidden shadow-2xl border border-stone-800">
            <template x-for="(img, idx) in images" :key="idx">
                <img :src="img" x-show="currentIdx === idx" class="w-full h-full object-cover">
            </template>
            <div class="absolute bottom-4 left-0 right-0 flex justify-center gap-2">
                <template x-for="(img, idx) in images" :key="idx">
                    <button @click="currentIdx = idx" class="w-2 h-2 rounded-full transition-all" :class="currentIdx === idx ? 'bg-amber-500 w-6' : 'bg-white/50'"></button>
                </template>
            </div>
        </div>

        <div class="mt-8">
            <h1 class="text-3xl font-black uppercase tracking-tight" x-text="productName"></h1>
            <p class="text-2xl font-bold text-amber-500 mt-2" x-text="formatPrice(totalPrice)"></p>
        </div>

        <form @submit.prevent="submitOrder" class="mt-8 space-y-4">
            <input type="text" x-model="formData.name" placeholder="الاسم واللقب" class="lux-input rounded-xl" required>
            <input type="tel" x-model="formData.phone" placeholder="رقم الهاتف" class="lux-input rounded-xl" required>
            
            <div class="grid grid-cols-2 gap-4">
                <select x-model="formData.wilaya" class="lux-input rounded-xl" required>
                    <option value="" class="bg-stone-900">الولاية...</option>
                    <template x-for="w in wilayas" :key="w"><option :value="w" class="bg-stone-900" x-text="w"></option></template>
                </select>
                <input type="text" x-model="formData.commune" placeholder="البلدية" class="lux-input rounded-xl" required>
            </div>

            <button type="submit" class="w-full bg-amber-600 text-white py-4 rounded-xl font-black text-lg shadow-lg hover:bg-amber-500 transition-all active:scale-95">
                تأكيد الطلب الآن
            </button>
        </form>
    </div>

    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('shopLogic', () => ({
                productName: 'ANIS LUXURY',
                images: ['https://via.placeholder.com/400'],
                currentIdx: 0,
                basePrice: 4500,
                totalPrice: 4500,
                formData: { name: '', phone: '', wilaya: '', commune: '' },
                wilayas: ["16-الجزائر", "31-وهران", "05-باتنة"], // ... كملهم

                init() {
                    const saved = JSON.parse(localStorage.getItem('selectedProduct'));
                    if(saved) {
                        this.productName = saved.name;
                        this.images = saved.images;
                        this.totalPrice = saved.price;
                    }
                },
                formatPrice(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + ' دج'; },
                async submitOrder() {
                    // كود الإرسال يبقى نفسه
                }
            }))
        })
    </script>
</body>
</html>
