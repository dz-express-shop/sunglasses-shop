<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANIS LUXURY | الكتالوج الحصري</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&family=Marcellus&display=swap" rel="stylesheet">
    
    <style>
        body { background: #050505; color: #e5e5e5; font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        .font-luxury { font-family: 'Marcellus', serif; }
        
        /* تأثيرات الظهور التدريجي للمنتجات */
        .product-card {
            opacity: 0; transform: translateY(40px);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* تغيير لون الدائرة المحددة */
        .color-swatch.active { border: 1px solid #fff; transform: scale(1.2); }
        
        /* إخفاء شريط التمرير مع بقاء وظيفته */
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        /* خط النيون الفاصل */
        .luxury-divider {
            height: 1px; width: 100%;
            background: linear-gradient(90deg, transparent, rgba(217, 119, 6, 0.5), transparent);
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navbar פاخر -->
    <nav class="fixed top-0 w-full z-40 bg-[#050505]/90 backdrop-blur-md border-b border-white/10 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="font-luxury text-xl md:text-2xl tracking-[0.3em] text-white uppercase">ANIS LUXURY</a>
            <div class="text-xs tracking-widest text-amber-500 font-bold" id="collection-title">CHARGEMENT...</div>
        </div>
    </nav>

    <!-- الهيدر السينمائي (يتغير حسب اختيار الرجال/النساء) -->
    <header class="relative pt-32 pb-16 px-6 text-center">
        <h1 class="text-4xl md:text-6xl font-black mb-4 uppercase" id="page-headline">التشكيلة الحصرية</h1>
        <p class="text-stone-400 text-sm md:text-base max-w-lg mx-auto font-light">
            تصفح أرقى الموديلات العالمية. حدد الماركة واللون ليناسب ذوقك الرفيع.
        </p>
        <div class="luxury-divider mt-12 max-w-2xl mx-auto"></div>
    </header>

    <!-- واجهة المتجر (فلاتر + منتجات) -->
    <main class="max-w-7xl mx-auto px-4 md:px-6 pb-24 flex flex-col md:flex-row gap-8">
        
        <!-- الفلاتر الجانبية (Sidebar) -->
        <aside class="w-full md:w-1/4 shrink-0">
            <div class="sticky top-28 bg-[#0a0a0a] border border-white/5 p-6 rounded-none">
                <h3 class="text-sm font-bold tracking-widest uppercase mb-6 border-b border-white/10 pb-4">فلترة الموديلات</h3>
                
                <!-- فلتر الماركات -->
                <div class="mb-8">
                    <h4 class="text-xs text-stone-400 mb-4">الماركة (MARQUE)</h4>
                    <div class="flex flex-col gap-3" id="brand-filters">
                        <!-- تضاف ديناميكيا بالجافاسكريبت -->
                    </div>
                </div>

                <button onclick="resetFilters()" class="w-full py-3 border border-stone-800 text-xs font-bold text-stone-400 hover:text-white hover:border-white transition-all">
                    إلغاء الفلاتر
                </button>
            </div>
        </aside>

        <!-- شبكة المنتجات (Product Grid) -->
        <div class="w-full md:w-3/4">
            <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-8">
                <!-- المنتجات تظهر هنا -->
            </div>
            
            <!-- رسالة عند عدم وجود منتج مطابق -->
            <div id="no-products" class="hidden text-center py-20 text-stone-500 text-sm">
                عذراً، لا توجد موديلات تطابق هذا البحث حالياً.
            </div>
        </div>
    </main>

    <!-- زر الواتساب العائم للتواصل المباشر مع الكونفيرماتريس -->
    <a href="https://wa.me/213791059501?text=مرحباً، أريد الاستفسار عن تشكيلة النظارات المتوفرة." target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform z-50 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
    </a>

    <!-- محرك الجافاسكريبت (The Brain) -->
    <script>
        // 1. تحديد نوع الزبون (رجال أم نساء) من الرابط URL
        const urlParams = new URLSearchParams(window.location.search);
        const side = urlParams.get('side') || 'homme'; // افتراضي رجال إذا لم يوجد

        // تحديث النصوص حسب القسم
        if(side === 'homme') {
            document.getElementById('collection-title').innerText = 'COLLECTION HOMME';
            document.getElementById('page-headline').innerText = 'النخبة الرجالية';
        } else {
            document.getElementById('collection-title').innerText = 'COLLECTION FEMME';
            document.getElementById('page-headline').innerText = 'الأناقة النسائية';
        }

        // 2. محاكاة قاعدة البيانات (Inventory DB - JSON)
        // لاحقا سيتم ربط هذه المصفوفة بـ Google Sheets لجلبها برمجياً
        const inventory = [
            {
                id: 'RB-AV-01',
                name: 'Ray-Ban Aviator Classic',
                brand: 'Ray-Ban',
                gender: 'homme',
                price: '4,500',
                colors: [
                    { name: 'Black', hex: '#000000', img: 'prod1-black.jpg' },
                    { name: 'Gold', hex: '#d4af37', img: 'prod1-gold.jpg' }
                ]
            },
            {
                id: 'CR-SP-02',
                name: 'Carrera Sport',
                brand: 'Carrera',
                gender: 'homme',
                price: '5,200',
                colors: [
                    { name: 'Blue', hex: '#1e3a8a', img: 'prod2-blue.jpg' },
                    { name: 'Black', hex: '#000000', img: 'prod2-black.jpg' }
                ]
            },
            {
                id: 'CH-EL-03',
                name: 'Chanel Elegance',
                brand: 'Chanel',
                gender: 'femme',
                price: '6,800',
                colors: [
                    { name: 'Rose', hex: '#e8b2c1', img: 'prod3-rose.jpg' },
                    { name: 'Tortoise', hex: '#4a3728', img: 'prod3-brown.jpg' }
                ]
            },
            {
                id: 'PR-SY-04',
                name: 'Prada Symbole',
                brand: 'Prada',
                gender: 'femme',
                price: '7,500',
                colors: [
                    { name: 'Black', hex: '#000000', img: 'prod4-black.jpg' },
                    { name: 'White', hex: '#ffffff', img: 'prod4-white.jpg' }
                ]
            }
        ];

        // تصفية المنتجات حسب القسم المختار (رجال / نساء)
        let currentProducts = inventory.filter(p => p.gender === side);
        let activeBrand = 'all';

        // 3. بناء فلاتر الماركات ديناميكياً
        function buildFilters() {
            const brands = [...new Set(currentProducts.map(p => p.brand))];
            const filterContainer = document.getElementById('brand-filters');
            
            filterContainer.innerHTML = `
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="radio" name="brand" value="all" checked onchange="filterByBrand('all')" class="hidden">
                    <div class="w-4 h-4 border border-stone-600 rounded-full flex items-center justify-center group-hover:border-amber-500 transition-colors">
                        <div class="w-2 h-2 bg-amber-500 rounded-full scale-0 transition-transform"></div>
                    </div>
                    <span class="text-sm font-medium text-stone-300 group-hover:text-white transition-colors">الكل (Tout)</span>
                </label>
            `;

            brands.forEach(brand => {
                filterContainer.innerHTML += `
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="radio" name="brand" value="${brand}" onchange="filterByBrand('${brand}')" class="hidden">
                        <div class="w-4 h-4 border border-stone-600 rounded-full flex items-center justify-center group-hover:border-amber-500 transition-colors">
                            <div class="w-2 h-2 bg-amber-500 rounded-full scale-0 transition-transform"></div>
                        </div>
                        <span class="text-sm font-medium text-stone-300 group-hover:text-white transition-colors uppercase">${brand}</span>
                    </label>
                `;
            });

            // CSS logic for custom radio buttons
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (e) => {
                    document.querySelectorAll('input[type="radio"] + div > div').forEach(dot => dot.classList.replace('scale-100', 'scale-0'));
                    if(e.target.checked) {
                        e.target.nextElementSibling.firstElementChild.classList.replace('scale-0', 'scale-100');
                    }
                });
            });
            // Trigger check for 'all'
            document.querySelector('input[value="all"]').dispatchEvent(new Event('change'));
        }

        // 4. نظام عرض المنتجات (Render Engine)
        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            const noProducts = document.getElementById('no-products');
            grid.innerHTML = '';

            if (products.length === 0) {
                noProducts.classList.remove('hidden');
            } else {
                noProducts.classList.add('hidden');
                
                products.forEach((product, index) => {
                    // توليد دوائر الألوان
                    let colorSwatches = '';
                    product.colors.forEach((c, i) => {
                        const isActive = i === 0 ? 'active' : '';
                        colorSwatches += `<div class="color-swatch w-4 h-4 rounded-full cursor-pointer transition-all duration-300 ${isActive}" style="background-color: ${c.hex};" onclick="changeProductImage(this, '${product.id}', '${c.img}')"></div>`;
                    });

                    // تأخير الظهور لعمل أنيميشن متتالي (Staggered Animation)
                    const delay = index * 0.1;

                    grid.innerHTML += `
                        <div class="product-card group flex flex-col" style="animation-delay: ${delay}s">
                            <!-- منطقة الصورة -->
                            <div class="relative aspect-square bg-[#0a0a0a] overflow-hidden cursor-pointer" onclick="goToProduct('${product.id}')">
                                <!-- سيتم وضع صورة افتراضية رمادية في حال لم تجد الصورة -->
                                <img id="img-${product.id}" src="${product.colors[0].img}" alt="${product.name}" class="w-full h-full object-cover object-center transform group-hover:scale-105 transition-transform duration-700" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'100%\\' height=\\'100%\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23111\\'/><text x=\\'50%\\' y=\\'50%\\' fill=\\'%23555\\' font-size=\\'12\\' text-anchor=\\'middle\\'>IMAGE: ${product.colors[0].img}</text></svg>'">
                                
                                <!-- زر الطلب السريع يظهر عند مرور الفأرة -->
                                <div class="absolute bottom-0 left-0 w-full p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300 hidden md:block">
                                    <button class="w-full bg-white text-black py-3 text-xs font-bold uppercase tracking-widest hover:bg-amber-500 hover:text-white transition-colors">COMMANDER</button>
                                </div>
                            </div>

                            <!-- معلومات المنتج -->
                            <div class="pt-4 flex-grow flex flex-col justify-between">
                                <div>
                                    <h3 class="text-xs text-stone-400 tracking-widest uppercase mb-1">${product.brand}</h3>
                                    <h2 class="text-sm md:text-base font-bold text-white mb-2 leading-tight">${product.name}</h2>
                                </div>
                                
                                <div class="flex justify-between items-center mt-2">
                                    <!-- السعر -->
                                    <span class="text-amber-500 font-bold text-sm">${product.price} DA</span>
                                    <!-- الألوان المتاحة -->
                                    <div class="flex gap-2">
                                        ${colorSwatches}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
        }

        // 5. وظيفة تغيير صورة المنتج عند الضغط على اللون (Dynamic Image Swap)
        window.changeProductImage = function(swatchElement, productId, newImgSrc) {
            // تحديث الصورة
            const imgElement = document.getElementById(`img-${productId}`);
            imgElement.src = newImgSrc;
            
            // تحديث الدائرة النشطة
            const swatches = swatchElement.parentElement.children;
            for(let s of swatches) { s.classList.remove('active'); }
            swatchElement.classList.add('active');
        }

        // 6. فلترة الماركات
        window.filterByBrand = function(brand) {
            activeBrand = brand;
            if (brand === 'all') {
                renderProducts(currentProducts);
            } else {
                const filtered = currentProducts.filter(p => p.brand === brand);
                renderProducts(filtered);
            }
        }

        window.resetFilters = function() {
            document.querySelector('input[value="all"]').click();
        }

        // 7. توجيه الزبون لصفحة المنتج والدفع
        window.goToProduct = function(productId) {
            window.location.href = `product.html?id=${productId}`;
        }

        // تشغيل البناء عند تحميل الصفحة
        buildFilters();
        renderProducts(currentProducts);
    </script>
</body>
</html>
