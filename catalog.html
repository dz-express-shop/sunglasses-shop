<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS LUXURY | الكتالوج الرسمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Cairo', sans-serif; background-color: #F9FAFB; }
        .card-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); }
        .card-hover:hover { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .skeleton { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="antialiased text-stone-900">

    <!-- النيفيغايشن -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-stone-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="font-black text-2xl tracking-tighter uppercase">ANIS <span class="text-amber-600">LUXURY</span></h1>
            <div class="flex gap-6 text-xs font-bold uppercase tracking-widest text-stone-500">
                <a href="#" class="hover:text-black transition">الرجال</a>
                <a href="#" class="hover:text-black transition">النساء</a>
            </div>
        </div>
    </nav>

    <div x-data="catalogueApp()" x-init="fetchProducts()" class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- عنوان القسم -->
        <div class="mb-12">
            <h2 class="text-4xl font-black uppercase mb-2">أحدث التشكيلات</h2>
            <div class="w-20 h-1 bg-amber-600"></div>
        </div>

        <!-- حالة التحميل (Skeleton Loading) -->
        <div x-show="loading" class="grid grid-cols-2 md:grid-cols-4 gap-8">
            <template x-for="i in 4">
                <div class="h-96 bg-stone-200 skeleton rounded-sm"></div>
            </template>
        </div>

        <!-- شبكة المنتجات -->
        <div x-show="!loading" x-cloak class="grid grid-cols-2 md:grid-cols-4 gap-8">
            <template x-for="product in products" :key="product.id">
                <div class="product-card group cursor-pointer" 
                     @click="goToProduct(product)">
                    
                    <!-- إطار الصورة مع سلايدر -->
                    <div class="relative aspect-[3/4] bg-stone-100 overflow-hidden mb-4"
                         x-data="{ activeImg: 0, hover: false }"
                         @mouseenter="hover = true; interval = setInterval(() => { activeImg = (activeImg + 1) % product.images.length }, 800)"
                         @mouseleave="hover = false; clearInterval(interval); activeImg = 0">
                        
                        <template x-for="(img, idx) in product.images" :key="idx">
                            <img :src="img" 
                                 x-show="activeImg === idx"
                                 class="absolute inset-0 w-full h-full object-cover transition-all duration-500"
                                 :class="hover ? 'scale-105' : 'scale-100'">
                        </template>
                        
                        <!-- بادج السعر -->
                        <div class="absolute top-4 left-4 bg-white px-3 py-1 font-black text-sm card-shadow">
                            <span x-text="product.price + ' دج'"></span>
                        </div>
                    </div>

                    <!-- تفاصيل المنتج -->
                    <div class="space-y-1">
                        <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest" x-text="product.brand"></p>
                        <h3 class="font-bold text-stone-900 uppercase" x-text="product.name"></h3>
                        <div class="flex gap-2 pt-2">
                            <template x-for="color in product.colors">
                                <div class="w-3 h-3 rounded-full border border-stone-200" :style="`background-color: ${color.hex}`"></div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script>
        function catalogueApp() {
            return {
                loading: true,
                products: [],
                async fetchProducts() {
                    try {
                        const response = await fetch("https://script.google.com/macros/s/AKfycbwv6ohDtq3W8JLc4lK6vTY4UlEBWzZ2l8p_2XvGVM87y3GE7Kl7kGrm50rZZ4VdcxYb/exec");
                        this.products = await response.json();
                    } catch (e) {
                        console.error("Error loading products");
                    } finally {
                        this.loading = false;
                    }
                },
                goToProduct(product) {
                    localStorage.setItem('selectedProduct', JSON.stringify(product));
                    window.location.href = 'product.html';
                }
            }
        }
    </script>
</body>
</html>
