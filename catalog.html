<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIS LUXURY | الكتالوج</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #FAFAFA; }
        .product-card { transition: all 0.4s ease; }
        .img-transition { transition: opacity 0.5s ease-in-out; }
    </style>
</head>
<body class="antialiased pb-10">

    <main class="max-w-6xl mx-auto p-4 md:p-8 mt-6">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- المنتجات تظهر هنا -->
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwv6ohDtq3W8JLc4lK6vTY4UlEBWzZ2l8p_2XvGVM87y3GE7Kl7kGrm50rZZ4VdcxYb/exec";

        async function fetchProducts() {
            const response = await fetch(API_URL);
            const products = await response.json();
            const grid = document.getElementById('product-grid');
            
            grid.innerHTML = products.map(product => `
                <div x-data="{ 
                    images: ${JSON.stringify(product.images || ['https://via.placeholder.com/400'])}, 
                    currentIdx: 0,
                    interval: null 
                }" 
                class="product-card bg-white border border-stone-100 rounded-sm overflow-hidden flex flex-col h-full"
                @mouseenter="interval = setInterval(() => { currentIdx = (currentIdx + 1) % images.length }, 1000)"
                @mouseleave="clearInterval(interval); currentIdx = 0"
                onclick="goToProduct('${encodeURIComponent(JSON.stringify(product))}')">
                    
                    <!-- السلايدر تاع الصور -->
                    <div class="relative aspect-square bg-stone-50 overflow-hidden">
                        <template x-for="(img, index) in images" :key="index">
                            <img :src="img" 
                                 x-show="currentIdx === index"
                                 class="absolute inset-0 w-full h-full object-cover mix-blend-multiply img-transition">
                        </template>
                    </div>

                    <div class="p-4 flex-1">
                        <h3 class="font-black text-stone-800 text-sm uppercase">${product.name}</h3>
                        <div class="mt-2 flex justify-between items-center">
                            <span class="font-black text-amber-600">${product.price} دج</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function goToProduct(productDataStr) {
            localStorage.setItem('selectedProduct', decodeURIComponent(productDataStr));
            window.location.href = 'product.html';
        }

        fetchProducts();
    </script>
</body>
</html>
