<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANIS LUXURY | Mobile Experience</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;400;700;900&family=Marcellus&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; font-family: 'Cairo', sans-serif; overflow: hidden; overscroll-behavior: none; }
        .font-luxury { font-family: 'Marcellus', serif; }
        
        /* مؤشر الفأرة للكمبيوتر فقط */
        @media (pointer: fine) {
            cursor: none;
            .custom-cursor {
                position: fixed; top: 0; left: 0; width: 12px; height: 12px;
                background: white; border-radius: 50%; pointer-events: none;
                z-index: 9999; mix-blend-mode: difference;
                transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s;
            }
            .custom-cursor.hovered { width: 60px; height: 60px; background: rgba(255,255,255,0.1); border: 1px solid white; mix-blend-mode: normal; }
        }
        @media (pointer: coarse) { .custom-cursor { display: none !important; } }

        /* شاشة التحميل السينمائية */
        .preloader {
            position: fixed; inset: 0; background: #020202; z-index: 9998;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            transition: opacity 1s ease-in-out, visibility 1s;
        }
        .loader-text { clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%); animation: revealText 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards 0.3s; }
        @keyframes revealText { to { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); } }

        /* الألواح وتأثير التمدد للهاتف */
        .panel { 
            transition: flex-grow 0.8s cubic-bezier(0.86, 0, 0.07, 1), filter 0.8s ease; 
            overflow: hidden; position: relative; cursor: pointer;
            flex-grow: 1; flex-basis: 50%;
        }
        
        /* خلفية البارالاكس الديناميكية */
        .bg-img {
            position: absolute; inset: -10%; width: 120%; height: 120%;
            background-size: cover; background-position: center;
            transition: transform 0.2s ease-out; /* استجابة الجيروسكوب */
            will-change: transform;
        }

        /* حركات الظهور للنصوص */
        .text-reveal { transform: translateY(30px); opacity: 0; transition: all 1s cubic-bezier(0.77, 0, 0.175, 1); }
        .loaded .text-reveal { transform: translateY(0); opacity: 1; }
        
        /* تأثير الضغط على الهاتف (Tap Effect) */
        .panel.expanding { flex-grow: 100; z-index: 50; }
        .panel.shrinking { flex-grow: 0.001; filter: brightness(0); opacity: 0; }
        .fade-out-content { opacity: 0 !important; transition: opacity 0.3s ease; }
    </style>
</head>
<body class="text-stone-200 antialiased select-none">

    <div class="custom-cursor" id="cursor"></div>

    <div class="preloader" id="preloader">
        <h1 class="font-luxury text-4xl md:text-7xl font-light tracking-[0.5em] text-white loader-text uppercase">ANIS</h1>
        <div class="mt-4 w-24 h-[1px] bg-white/20 overflow-hidden"><div class="h-full bg-white w-full animate-pulse"></div></div>
    </div>

    <div class="absolute top-6 md:top-10 left-1/2 transform -translate-x-1/2 z-50 text-center pointer-events-none mix-blend-difference w-full">
        <h1 class="font-luxury text-xl md:text-4xl tracking-[0.4em] text-white uppercase">ANIS LUXURY</h1>
    </div>

    <div class="flex flex-col md:flex-row h-[100dvh] w-full" id="main-container">
        
        <div class="panel flex flex-col justify-end p-6 md:p-24 border-b md:border-b-0 md:border-l border-stone-800" id="panel-homme" data-href="catalog.html?side=homme">
            <div class="bg-img parallax-bg" style="background-image: url('homme-banner.jpg');"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#020202] via-[#020202]/60 to-transparent opacity-95"></div>
            
            <div class="relative z-10 text-right w-full content-wrapper">
                <span class="text-[9px] md:text-[10px] tracking-[0.3em] text-amber-500 mb-2 md:mb-4 block text-reveal" style="transition-delay: 0.8s;">GENTLEMEN EDITION</span>
                <h2 class="text-3xl md:text-6xl font-black tracking-tighter mb-2 md:mb-4 text-white text-reveal uppercase" style="transition-delay: 0.9s;">الزين والهمّة</h2>
                <p class="text-stone-400 text-[11px] md:text-sm font-light leading-relaxed mb-4 md:mb-8 text-reveal max-w-[90%] md:max-w-xl ml-auto" style="transition-delay: 1s;">
                    تصاميم تفرض وجودك قبل ما تتكلم. تشكيلة نظارات شمسية للرجل اللي يعشق التفاصيل.
                </p>
                <div class="text-reveal" style="transition-delay: 1.1s;">
                    <div class="inline-flex items-center gap-2 px-6 py-3 md:px-8 md:py-4 bg-white text-black text-[10px] md:text-xs font-bold tracking-widest uppercase hover-target">
                        تسوق للرجال
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
                    </div>
                </div>
            </div>
            <div class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-500 loading-spinner z-20 pointer-events-none">
                <div class="w-10 h-10 border-2 border-amber-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>

        <div class="panel flex flex-col justify-end p-6 md:p-24" id="panel-femme" data-href="catalog.html?side=femme">
            <div class="bg-img parallax-bg" style="background-image: url('femme-banner.jpg');"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-[#020202] via-[#020202]/60 to-transparent opacity-95"></div>
            
            <div class="relative z-10 text-right w-full content-wrapper">
                <span class="text-[9px] md:text-[10px] tracking-[0.3em] text-stone-400 mb-2 md:mb-4 block text-reveal" style="transition-delay: 0.8s;">LADIES EXCLUSIVE</span>
                <h2 class="text-3xl md:text-6xl font-black tracking-tighter mb-2 md:mb-4 text-white text-reveal uppercase" style="transition-delay: 0.9s;">سحر ما يتخباش</h2>
                <p class="text-stone-400 text-[11px] md:text-sm font-light leading-relaxed mb-4 md:mb-8 text-reveal max-w-[90%] md:max-w-xl ml-auto" style="transition-delay: 1s;">
                    لمسة من النخبة الفاخرة تكمّل إطلالتك. أرقى الموديلات العالمية المتاحة لتبرز جاذبيتك الساحرة.
                </p>
                <div class="text-reveal" style="transition-delay: 1.1s;">
                    <div class="inline-flex items-center gap-2 px-6 py-3 md:px-8 md:py-4 border border-white text-white text-[10px] md:text-xs font-bold tracking-widest uppercase hover-target">
                        تسوقي للنساء
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" /></svg>
                    </div>
                </div>
            </div>
            <div class="absolute inset-0 flex items-center justify-center opacity-0 transition-opacity duration-500 loading-spinner z-20 pointer-events-none">
                <div class="w-10 h-10 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>

    </div>

    <script>
        const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const bgs = document.querySelectorAll('.parallax-bg');
        
        // 1. نظام التحميل
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('preloader').style.opacity = '0';
                document.getElementById('preloader').style.visibility = 'hidden';
                document.body.classList.add('loaded'); // تفعيل حركة النصوص
            }, 1800);
        });

        // 2. نظام التمدد عند اللمس (Tap-to-Expand Navigation)
        const panels = document.querySelectorAll('.panel');
        panels.forEach(panel => {
            panel.addEventListener('click', function() {
                // إيقاف التفاعل مع القسم الآخر
                panels.forEach(p => {
                    if(p !== this) p.classList.add('shrinking');
                });
                
                // تمديد القسم الحالي
                this.classList.add('expanding');
                this.querySelector('.content-wrapper').classList.add('fade-out-content');
                this.querySelector('.loading-spinner').style.opacity = '1';

                // الانتقال للصفحة بعد انتهاء الحركة
                const href = this.getAttribute('data-href');
                setTimeout(() => {
                    window.location.href = href;
                }, 900); // 900ms لتكتمل حركة التمدد الفخمة
            });
        });

        // 3. فيزياء الكمبيوتر (Custom Cursor & Mouse Parallax)
        if (!isTouch) {
            const cursor = document.getElementById('cursor');
            let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
            let cursorX = mouseX, cursorY = mouseY;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                // Parallax Desktop
                const px = (e.clientX - window.innerWidth / 2) * 0.015;
                const py = (e.clientY - window.innerHeight / 2) * 0.015;
                bgs.forEach(bg => bg.style.transform = `translate(${px}px, ${py}px) scale(1.05)`);
            });

            function animateCursor() {
                cursorX += (mouseX - cursorX) * 0.15; 
                cursorY += (mouseY - cursorY) * 0.15;
                cursor.style.transform = `translate(${cursorX}px, ${cursorY}px)`;
                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            document.querySelectorAll('.hover-target').forEach(t => {
                t.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
                t.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
            });
        }

        // 4. فيزياء الهاتف (Gyroscope Parallax)
        if (isTouch && window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                // استخراج قيم الميلان (Gamma لليمين/اليسار, Beta للأعلى/الأسفل)
                let gamma = e.gamma; // -90 to 90
                let beta = e.beta;   // -180 to 180
                
                // تحديد الحدود لتفادي انقلاب الصورة
                if(gamma > 45) gamma = 45; if(gamma < -45) gamma = -45;
                if(beta > 45) beta = 45; if(beta < -45) beta = -45;

                // تحويل الميلان إلى بكسلات
                const moveX = gamma * 0.5;
                const moveY = beta * 0.5;

                bgs.forEach(bg => {
                    bg.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;
                });
            });
        }
    </script>
</body>
</html>
